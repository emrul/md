<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkdownMD</title>
  </head>
  <body>
    <div class="app">
      <!-- Tab strip: TabManager renders one .tab per open tab -->
      <div class="tab-strip" id="tab-strip"></div>

      <!-- Toolbar: buttons built by mountToolbar() in JS so icon + binding
           + group definitions live in one place. -->
      <div class="toolbar" role="toolbar" aria-label="Editor toolbar" id="toolbar"></div>

      <!-- Tab host: TabManager appends one .tab-mount per open tab -->
      <div class="tab-host" id="tab-host"></div>

      <!-- Status bar -->
      <div class="status-bar">
        <span id="st-words">0 words</span>
        <span id="st-chars">0 characters</span>
        <span id="st-lines">0 lines</span>
        <span id="st-tokens" title="Rough estimate (~chars/4)">~0 tokens</span>
        <span id="st-git" class="st-git" style="margin-left: auto" hidden></span>
        <span id="st-file">Markdown</span>
      </div>
    </div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
