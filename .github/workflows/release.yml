name: Release

# Builds and publishes platform artifacts whenever a v* tag is pushed.
# workflow_dispatch is included so the build matrix can be exercised manually
# without cutting a release (the release job is skipped unless a tag triggered).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single source of truth for the Wails CLI version — keep in step with the
  # github.com/wailsapp/wails/v3 require in go.mod.
  WAILS_VERSION: v3.0.0-alpha.96
  NODE_VERSION: '20'
  # Guard against OOM during the Vite frontend build (large bundles) on the
  # constrained hosted runners — per the Wails GitHub Actions guidance.
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  build-macos:
    name: macOS (arm64)
    runs-on: macos-14 # Apple Silicon
    env:
      # Developer ID signing + notarization secrets. When absent (forks, or
      # before they're configured) the job falls back to the Taskfile's ad-hoc
      # signing — the app still runs, users just clear Gatekeeper once.
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install wails3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Determine signing availability
        id: signing
        run: |
          if [ -n "$MACOS_SIGN_IDENTITY" ] && [ -n "$MACOS_CERT_P12_BASE64" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "Signing secrets absent — building with ad-hoc signature."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up signing keychain
        if: steps.signing.outputs.enabled == 'true'
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          printf '%s' "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Put our keychain first in the search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          # Store notary creds in the same keychain so submit can read them.
          xcrun notarytool store-credentials "notarize" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --keychain "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PRODUCT_VERSION=$VERSION" >> "$GITHUB_ENV"
          wails3 update build-assets -name MarkdownMD -binaryname MarkdownMD \
            -config build/config.yml -dir build -productversion "$VERSION"
      - name: Package
        run: wails3 task darwin:package PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
      - name: Sign & notarize
        if: steps.signing.outputs.enabled == 'true'
        run: |
          APP="bin/MarkdownMD.app"
          # Re-sign over the ad-hoc signature with Developer ID + hardened runtime.
          codesign --force --deep --timestamp --options runtime \
            --sign "$MACOS_SIGN_IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --keychain-profile "notarize" --keychain "$KEYCHAIN_PATH" --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
      - name: Zip .app bundle
        run: |
          cd bin
          ditto -c -k --keepParent "MarkdownMD.app" "MarkdownMD-${GITHUB_REF_NAME}-macos-arm64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: bin/MarkdownMD-*-macos-arm64.zip
          if-no-files-found: error

  build-windows:
    name: Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
      - name: Install wails3 CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
          echo "$(go env GOPATH)\bin" >> $env:GITHUB_PATH
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v', ''
          "PRODUCT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          wails3 update build-assets -name MarkdownMD -binaryname MarkdownMD -config build/config.yml -dir build -productversion $version
      - name: Package
        run: wails3 task windows:package PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-out | Out-Null
          Get-ChildItem build/windows/nsis/*installer*.exe | ForEach-Object {
            Copy-Item $_.FullName "dist-out/MarkdownMD-${env:GITHUB_REF_NAME}-windows-amd64-installer.exe"
          }
          Copy-Item bin/MarkdownMD.exe "dist-out/MarkdownMD-${env:GITHUB_REF_NAME}-windows-amd64.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist-out/*
          if-no-files-found: error

  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm # GitHub-hosted Arm64 Linux runner
    env:
      # Lets appimagetool run without a mounted FUSE device (CI has none).
      APPIMAGE_EXTRACT_AND_RUN: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libwebkitgtk-6.0-dev \
            libfuse2
      - name: Install wails3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PRODUCT_VERSION=$VERSION" >> "$GITHUB_ENV"
          wails3 update build-assets -name MarkdownMD -binaryname MarkdownMD \
            -config build/config.yml -dir build -productversion "$VERSION"
      - name: Package
        run: wails3 task linux:package PRODUCT_VERSION=${{ env.PRODUCT_VERSION }}
      - name: Collect artifacts
        run: |
          mkdir -p dist-out
          shopt -s nullglob
          for f in bin/*.AppImage bin/*.deb bin/*.rpm bin/*.pkg.tar.zst; do
            cp "$f" dist-out/
          done
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist-out/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    # Only publish when a tag triggered the run; manual dispatch just builds.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate SHA256SUMS
        run: |
          # The updater fetches this sidecar and verifies the downloaded asset's
          # digest against it. Filenames must be the release basenames.
          : > SHA256SUMS
          find artifacts -type f | sort | while read -r f; do
            printf '%s  %s\n' "$(sha256sum "$f" | cut -d' ' -f1)" "$(basename "$f")" >> SHA256SUMS
          done
          echo "----- SHA256SUMS -----"; cat SHA256SUMS
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
